<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agenda Simples</title>

  <style>
    body {
      font-family: Arial;
      padding: 100px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 30px;
      text-align: left;
    }

    th {
      background: #333;
      color: white;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 30spx;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📅 Agenda de Eventos</h2>

<table id="tabela">
  <thead>
    <tr>
      <th>DATA</th>
      <th>EVENTO</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button onclick="adicionarLinha()">➕ Adicionar</button>
<button onclick="salvar()">💾 Salvar</button>

<script>

function adicionarLinha(data = '', evento = '') {
  const tabela = document.querySelector("#tabela tbody");

  const linha = document.createElement("tr");

  linha.innerHTML = `
    <td><input type="date" value="${data}"></td>
    <td><input type="text" value="${evento}"></td>
  `;

  tabela.appendChild(linha);
}

// Salvar no navegador
function salvar() {
  const linhas = document.querySelectorAll("#tabela tbody tr");
  let dados = [];

  linhas.forEach(linha => {
    const data = linha.children[0].children[0].value;
    const evento = linha.children[1].children[0].value;

    if (data && evento) {
      dados.push({ data, evento });
    }
  });

  localStorage.setItem("agenda", JSON.stringify(dados));
  alert("Salvo com sucesso!");
}

// Carregar e limpar datas antigas
function carregar() {
  const dados = JSON.parse(localStorage.getItem("agenda")) || [];
  const hoje = new Date().toISOString().split("T")[0];

  dados.forEach(item => {
    if (item.data >= hoje) {
      adicionarLinha(item.data, item.evento);
    }
  });
}

// Inicia
carregar();

</script>

</body>
</html>
